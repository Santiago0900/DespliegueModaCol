<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Crear contraseña</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet"/>

    <style>
        body {
            background: linear-gradient(135deg, #0d6efd, #198754);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            border-radius: 16px;
            max-width: 420px;
            width: 100%;
        }

        .logo {
            font-size: 22px;
            font-weight: bold;
            color: #0d6efd;
        }

        .input-group-text {
            cursor: pointer;
        }

        .btn-primary {
            border-radius: 10px;
        }

        .small-text {
            font-size: 13px;
            color: #777;
        }
    </style>
</head>

<body>

<div class="card shadow-lg p-4">

    <!-- HEADER -->
    <div class="text-center mb-3">
        <div class="logo">MODACOL</div>
        <h5 class="mt-2">Crear contraseña</h5>
        <p class="small-text mb-0">
            Usuario: <strong>{{ usuario.nombre }}</strong>
        </p>
    </div>

    <!-- ERROR -->
    {% if error %}
    <div class="alert alert-danger py-2">
        {{ error }}
    </div>
    {% endif %}

    <!-- SUCCESS -->
    {% if success %}
    <div class="alert alert-success py-2 text-center">
        {{ success }}
        <div class="mt-2">
            <a href="/" class="btn btn-sm btn-outline-success">
                Ir al sistema
            </a>
        </div>
    </div>
    {% else %}

    <!-- FORM -->
    <form method="post">
        {% csrf_token %}

        <!-- PASSWORD -->
        <div class="mb-3">
            <label class="form-label small fw-semibold">Nueva contraseña</label>

            <div class="input-group">
                <input type="password" name="password" id="password"
                       class="form-control"
                       placeholder="Mínimo 8 caracteres">

                <span class="input-group-text" onclick="togglePassword('password', this)">
                    <i class="bi bi-eye"></i>
                </span>
            </div>
        </div>

        <!-- CONFIRM PASSWORD -->
        <div class="mb-3">
            <label class="form-label small fw-semibold">Confirmar contraseña</label>

            <div class="input-group">
                <input type="password" name="confirmar_password" id="confirmar_password"
                       class="form-control"
                       placeholder="Repite la contraseña">

                <span class="input-group-text" onclick="togglePassword('confirmar_password', this)">
                    <i class="bi bi-eye"></i>
                </span>
            </div>
        </div>

        <!-- VALIDACIONES VISUALES -->
        <div class="small-text mb-3">
            La contraseña debe:
            <ul class="mb-0">
                <li>tener al menos 8 caracteres</li>
                <li>incluir letras y números</li>
            </ul>
        </div>

        <!-- BOTÓN -->
        <div class="d-grid">
            <button type="submit" class="btn btn-primary">
                <i class="bi bi-check-circle me-1"></i>
                Guardar contraseña
            </button>
        </div>

    </form>

    {% endif %}

</div>

<script>
    function togglePassword(id, el) {
        const input = document.getElementById(id);
        const icon = el.querySelector("i");

        if (input.type === "password") {
            input.type = "text";
            icon.classList.remove("bi-eye");
            icon.classList.add("bi-eye-slash");
        } else {
            input.type = "password";
            icon.classList.remove("bi-eye-slash");
            icon.classList.add("bi-eye");
        }
    }
</script>

</body>
</html>
